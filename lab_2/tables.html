<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 2 - Таблицы</title>
</head>
<body>

<h1>Задание 2 — Таблицы</h1>

<h2>1-я таблица</h2>
<table border="1" cellpadding="15" cellspacing="0">
   <tr>
    <th rowspan="3">1</th>
    <td colspan="2">2</td>
   </tr>
   <tr>
     <td>5</td>
     <td>6</td>
   </tr>
</table>

<h2>2-я таблица</h2>
<table border="1" cellpadding="15" cellspacing="0">
   <tr>
    <th colspan="2">1</th>
   </tr>
   <tr>
    <td rowspan="2">3</td>
     <td>4</td>
   </tr>
   <tr>
     <td>6</td>
   </tr>
</table>

<h2>3-я таблица</h2>
<table border="1" cellpadding="15" cellspacing="0">
     <tr>
         <td>1</td>
         <td rowspan="2">2</td>
     </tr>
     <tr>
         <td>3</td>
     </tr>
     <tr>
         <td colspan="2">5</td>
     </tr>
</table>

<h2>4-я таблица</h2>
<table border="1" cellpadding="15" cellspacing="0">
   <tr>
    <th colspan="2">1</th>
   </tr>
   <tr>
     <td>3</td>
     <td>4</td>
   </tr>
   <tr>
    <td colspan="2">5</td>
   </tr>
</table>

</body>
</html>
